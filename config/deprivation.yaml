# ============================================================================
# Deprivation functions g(t): increasing, convex functions of travel time t
# (minutes). The deprivation function IS the impedance function of a gravity
# model run in the opposite direction — increasing rather than decreasing —
# and is applied to an EFFECTIVE travel time:
#
#   everyday  : g( softmin_j( t_ij * c_j ) )   with 2SFCA congestion factor c_j
#   emergency : g( min_j t_ij )                nearest facility only
#
# ALL parameters are TRANSFERRED FROM THE LITERATURE, never estimated here and
# never fabricated. Every `null` below is a deliberate placeholder: the
# pipeline refuses to evaluate a function whose parameters are null and its
# error message repeats the `source` line so you know exactly which paper the
# number must come from. Fill values ONLY from the cited publications.
#
# Functional forms implemented in src/depacc/deprivation/functions.py:
#   exponential : g(t) = scale * (exp(beta * t) - 1)            beta > 0
#   box_cox     : g(t) = scale * ((t + shift)^lam - shift^lam) / lam,  lam > 1
# Both satisfy g(0) = 0, g' > 0, g'' >= 0 (convex).
# ============================================================================

deprivation:
  everyday:
    # Everyday/urban-planning framing: dimensionless Deprivation Level
    # Function (DLF). SATURATING logistic S-curve — everyday services are
    # substitutable and non-critical, so relative deprivation tops out at a
    # ceiling once access is poor enough.
    kind: "DLF"
    form: "logistic"
    time_unit: "minutes"
    params:
      Lmax: 1.0    # saturation ceiling (dimensionless relative severity, 0-1)
      t0: 15.0     # inflection (minutes); the ~15-minute-city access threshold
      k: 0.2       # steepness (per minute); calibrated to the intra-urban range
    source: >-
      Form: Wang et al. 2017 (logistic S-curve, needs-based severity). Shape
      TRANSFERRED, curvature CALIBRATED to the intra-urban travel range (NOT
      lifted from hours-scale estimates). See methods.md §3.
    note: >-
      Form from Wang et al. 2017; curvature calibrated to intra-urban travel
      range, NOT transferred from hours-scale estimates.

  emergency:
    # Emergency/disaster framing: monetary Deprivation Cost Function (DCF).
    # CONVEX Box-Cox — time-critical, so the cost escalates ever more steeply;
    # its curvature matters most here.
    kind: "DCF"
    form: "box_cox"
    time_unit: "minutes"
    params:
      lam: 1.8     # Box-Cox exponent (>1 => convex); calibrated to time-to-care
      shift: 1.0   # time offset (minutes)
      scale: 1.0   # relative units; anchor to a VSL only if absolute magnitudes needed
    source: >-
      Form: Cantillo et al. 2018; Delgado-Lindeman 2019 (ambulance/time-to-care
      DCF). Convex Box-Cox TRANSFERRED, curvature CALIBRATED to the clinical
      time-to-care threshold (~45-60 min). See methods.md §3.
    note: >-
      Convex form per Cantillo 2018 / Delgado-Lindeman 2019; curvature
      calibrated to clinical time-to-care threshold (~45-60 min).

  # Sensitivity analysis: each entry is an alternative specification that can
  # be swapped in for either regime via `depacc run --deprivation-spec NAME`.
  alternatives:
    everyday_box_cox:
      kind: "DLF"
      form: "box_cox"
      params: { lam: null, scale: null, shift: null }
      source: "TODO(cite): Box-Cox DLF variant from the Wang et al. line of work."
    emergency_exponential:
      kind: "DCF"
      form: "exponential"
      params: { beta: null, scale: null }
      source: >-
        TODO(cite): exponential DCF variant (Holguín-Veras et al. line of
        work).
