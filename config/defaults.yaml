# ============================================================================
# Global defaults for the potential-deprivation accessibility study.
# Per-city files in config/cities/*.yaml override any key here (deep merge).
# ============================================================================

crs:
  # Continental analysis CRS: ETRS89 / LAEA Europe.
  analysis: "EPSG:3035"
  # Optional per-city projected CRS for local routing accuracy; a city config
  # may set e.g. "EPSG:32632" (UTM 32N). null = use analysis CRS throughout.
  local: null

city_definition:
  # One harmonised definition for every city in the sample:
  # Eurostat-OECD Functional Urban Areas (GISCO URAU), cross-checked against
  # JRC GHS Urban Centre Database / Degree of Urbanisation.
  source: "eurostat_oecd_fua"
  # Tier-1 inclusion threshold on FUA population.
  fua_size_threshold: 100000
  # "stratified": size-stratified sample within a few countries (fast first
  # cross-city figure). "all_eu_fua": full continental run.
  city_sample_mode: "stratified"
  stratified_countries: ["DE", "NL", "FR"]
  # Size strata bounds (FUA population) used by the stratified sampler.
  strata_bounds: [100000, 250000, 500000, 1000000, 5000000]

tiers:
  tier1:
    # Harmonised continental layer: OSM-based walk + car ONLY. No transit.
    modes: ["walk", "car"]
    population: "ghs_pop_100m"
    demographics: "eurostat_census_2021_1km"
    # Optional coarse cross-check with the Weiss et al. motorised friction
    # surface (1 km).
    friction_surface_check: false
  tier2:
    # Deep-dive subset: adds multimodal public transit (r5py + R5 + GTFS) and
    # fine national SES grids (DE Zensus 2022 100m, NL CBS 100m, FR INSEE
    # Filosofi 200m, UK LSOA + IMD).
    modes: ["walk", "car", "transit"]
    countries: ["DE", "NL", "FR", "UK", "SE", "NO", "DK", "FI"]

routing:
  # r5:       reference engine, all modes (walk/car/transit), needs .pbf +
  #           JDK 21 (+GTFS for transit). Tier-2 default.
  # friction: Tier-1 fast path — least-cost paths over the Weiss et al.
  #           friction surfaces (walk/car only, ~1 km, a few MB per city via
  #           WCS window download, no Java). Pair with
  #           sources.facilities: overpass. Coarser but harmonised; Tier-2
  #           r5 runs cross-check the rankings (methods.md §5, §7).
  engine: "r5"
  departure:
    # Fixed representative departure for transit routing (Tier 2); walk/car
    # are time-independent in R5. Weekday morning, local time.
    weekday: "tuesday"
    time_window_start: "08:00"
    time_window_minutes: 60
  max_time_min: 120      # absolute travel-time cutoff / fallback per mode
  # Per-mode cutoffs (minutes) actually used to build the matrices. Set well
  # beyond the 2SFCA catchment bandwidths and past DLF/DCF saturation, but
  # tight enough to keep large-FUA matrices tractable. null -> max_time_min.
  max_time_min_by_mode:
    walk: 30
    car: 60
    transit: 75
  walk_speed_kmh: 4.8
  # Origins are centroids of populated GHS-POP 100m cells inside the FUA.
  min_cell_population: 1.0
  # Scale controls for large FUAs (176k+ cells): compute travel times in
  # origin batches to bound memory, and keep only the k nearest reachable
  # facilities per cell and service. Far facilities are negligible for the
  # soft-min and nearest-facility measures; k is set generously so the 2SFCA
  # demand count is essentially complete within each catchment. Both are
  # sensitivity-testable and apply to every routing engine.
  origin_chunk: 5000
  k_nearest: 30

softmin:
  # Soft-minimum smoothing parameter kappa (per minute). Larger kappa -> closer
  # to the hard minimum; the softmin lies in [min - ln(n)/kappa, min].
  # Methodological smoothing choice, NOT a literature-transferred parameter;
  # sensitivity-test over `kappa_sensitivity`.
  kappa: 0.5
  kappa_sensitivity: [0.1, 0.25, 0.5, 1.0, 2.0]

catchment:  # 2SFCA congestion factor (everyday regime only)
  kernel:
    type: "gaussian"     # gaussian | binary
    # Catchment bandwidth in minutes, per mode. Methodological choice,
    # sensitivity-tested; harmonised across cities.
    bandwidth_min:
      walk: 15
      car: 30
      transit: 30
  # Congestion-inflation exponent gamma: c_j = (R_ref / R_j) ** gamma, where
  # R_j is the 2SFCA supply-to-demand ratio of facility j and R_ref the
  # population-weighted median ratio in the city. gamma = 0 disables
  # congestion inflation. Sensitivity-tested.
  gamma: 0.5
  gamma_sensitivity: [0.0, 0.25, 0.5, 1.0]
  reference: "weighted_median"   # weighted_median | mean
  # Numerical guards on the inflation factor (not literature parameters).
  factor_clip: [0.5, 4.0]

regimes:
  # Which travel-time mode(s) feed each regime's surface. With several modes
  # the elementwise minimum per origin-destination pair is used (traveller
  # takes the faster option). The FIRST mode also selects the 2SFCA catchment
  # bandwidth. Tier-1 runs must not list "transit".
  everyday:
    modes: ["walk"]
    # Composite across everyday services: equal-weight mean of the
    # per-service deprivation surfaces (weights overridable per city).
    composite: "mean"
  emergency:
    modes: ["car"]
    composite: "mean"

unreachable:
  # Policy for cells with zero reachable facilities of a service within
  # max_time_min: "exclude" drops them from aggregate statistics (but always
  # reports their count and population share); "cap_at_max_time" assigns the
  # deprivation value at max_time_min.
  policy: "cap_at_max_time"

typology:
  # Bivariate everyday x emergency classification thresholds on the
  # population-weighted PERCENTILE surfaces. 0.50 = median split; 0.75 =
  # acute compounding. Both are computed and reported — not a single split.
  thresholds: [0.5, 0.75]

cityvector:
  # LEVEL features (deprivation-function-FREE): population share whose
  # regime travel time exceeds each policy threshold (minutes). Comparable
  # across cities independent of any deprivation-function calibration.
  access_thresholds_min:
    everyday: [15, 30]
    emergency: [30, 45, 60]
  # Cross-city feature standardisation before clustering: "robust"
  # (median / IQR; default — small, outlier-prone sample) or "zscore".
  cross_city_scaler: "robust"
  clustering:
    k_range: [2, 6]      # candidate cluster counts; k chosen by silhouette
    bootstrap: 50        # resamples for the stability (ARI) check
    random_state: 0

friction:
  # Weiss et al. (2020) friction surfaces, fetched as per-city WCS windows
  # from the Malaria Atlas Project geoserver (CC-BY 4.0). Override `wcs` if
  # the coverage ids change upstream (see access/friction.py).
  # Margin (degrees) around the FUA bbox: enough for detours around the
  # boundary, small enough to keep the raster (and cost-distance memory)
  # bounded. ~0.25 deg is ~28 km.
  pad_deg: 0.25
  # Facility sources per Dijkstra call — caps peak memory at
  # (source_batch x n_pixels), never (n_facilities x n_pixels).
  source_batch: 64
  wcs:
    base: "https://data.malariaatlas.org/geoserver/Accessibility/ows"
    coverages:
      car: "Accessibility__202001_Global_Motorized_Friction_Surface"
      walk: "Accessibility__202001_Global_Walking_Only_Friction_Surface"

quality:
  # Restrict the Tier-1 sample to cities in countries whose OSM completeness
  # ratio (OSM facility count / registry count) is at least this value.
  # null disables the filter.
  completeness_threshold: null
  benchmark_services: ["hospital", "pharmacy"]

output:
  root: "data/derived"
  raw_root: "data/raw"
  cache_root: "data/cache"
