name: depacc — run one city

# Runs the full depacc pipeline for one configured city ON GITHUB'S RUNNERS —
# nothing to download or install locally.
#
# Trigger: GitHub → Actions → "depacc — run one city" → Run workflow, type the
# city id (a file in deprivation-accessibility-eu/config/cities/, e.g.
# hamburg, koeln, demo). Results (surfaces, typology, equity tables, figures)
# are uploaded as a build artifact named depacc-<city>; download them from the
# run page. Raw downloads are cached between runs per city.
#
# Notes:
# - Tier-2 r5 cities (hamburg, koeln) need the big inputs (state .pbf, GTFS):
#   allow 1-3 h on the first, uncached run.
# - Tier-1 fast-path cities (friction engine + Overpass) run in minutes.
# - The deprivation stage stops with a clear error until the literature
#   parameters in config/deprivation.yaml are filled in (see methods.md §3);
#   use stage=ingest or access to prepare data before that.

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City id (config/cities/<id>.yaml)"
        required: true
      stage:
        description: "Pipeline stage (all | ingest | access | deprivation | divergence | equity | viz)"
        required: false
        default: "all"

env:
  MPLBACKEND: Agg

jobs:
  run-city:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    defaults:
      run:
        working-directory: deprivation-accessibility-eu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install depacc (full stack)
        run: pip install -e ".[full,dev]"

      - name: Restore raw-data cache
        uses: actions/cache@v4
        with:
          path: deprivation-accessibility-eu/data/raw
          key: depacc-raw-${{ inputs.city }}-${{ hashFiles('deprivation-accessibility-eu/config/cities/*.yaml') }}
          restore-keys: |
            depacc-raw-${{ inputs.city }}-
            depacc-raw-

      - name: Run pipeline
        run: depacc run --city "${{ inputs.city }}" --stage "${{ inputs.stage }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depacc-${{ inputs.city }}
          path: |
            deprivation-accessibility-eu/data/derived/${{ inputs.city }}
            deprivation-accessibility-eu/data/derived/cityplane.csv
          if-no-files-found: warn
          retention-days: 90
