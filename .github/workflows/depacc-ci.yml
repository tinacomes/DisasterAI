name: depacc CI (deprivation-accessibility-eu)

# Unit tests for the deprivation-accessibility subproject only; the DisasterAI
# ABM keeps its own smoke-test workflow. Path-filtered so ABM pushes don't
# trigger it.
on:
  push:
    paths:
      - "deprivation-accessibility-eu/**"
      - ".github/workflows/depacc-ci.yml"
  pull_request:
    paths:
      - "deprivation-accessibility-eu/**"
      - ".github/workflows/depacc-ci.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: deprivation-accessibility-eu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core package + test deps (stats extra enables the
              regression/clustering tests)
        run: pip install -e ".[dev,stats]"
      - name: Run unit tests
        run: pytest --cov=depacc --cov-report=term-missing
      - name: Validate shipped configs load
        run: depacc validate --city hamburg
